services:
  - type: web
    name: ai-market-research-backend
    env: python
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-research-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.vercel.app
      - key: DEBUG
        value: false

databases:
  - name: market-research-db
    region: oregon
    plan: free
    databaseName: market_research
    user: market_user